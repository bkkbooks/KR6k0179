front:
  text: 淨心誡觀法序餘杭郡沙門釋元照述太近至易無如自心入死出生了不知覺其體明瑩其量包容故使一迷遽生諸法其猶寶鑑因明而像生又若長川緣澄而波動謂心異物為物轉心吸攬塵緣積成勞結淪歷諸有沈屈己靈餘趣無知人倫尠學縱令聽習多墮邪癡奔逐名聞封著知解至有江南江北走覓菩提曲見邪心未嘗正直野猿騰躍家犬遲迴勞我聖師提耳垂誨曲留妙藥的指病根囊括兩乘津通萬行託彼親度用表弘慈囑使竊闚特彰祕勝深訶講論苦勉修治然古德傳通雙弘教觀諸部則以教開解斯文乃以觀示修既非無目而遊豈是數他之寶須信從真起妄舉體現前達妄即真不從他得淨心之要覽者宜知
